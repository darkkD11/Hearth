version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hearth-db
    environment:
      POSTGRES_DB: hearth
      POSTGRES_USER: hearth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hearthdev123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: hearth-livekit
    command: --config /etc/livekit.yaml --dev
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "51000-51060:51000-51060/udp"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
