# LiveKit Server Configuration
# For development use — do NOT use these keys in production

port: 7880
rtc:
  port_range_start: 51000
  port_range_end: 51060
  use_external_ip: false
  tcp_port: 7881

keys:
  devkey: devsecret

logging:
  level: info
  pion_level: warn

room:
  empty_timeout: 300       # 5 minutes
  max_participants: 10     # More than enough for 6-8 friends

# Screen share / video quality
video:
  dynacast: true           # Only send video to active subscribers
  
# Allow high-quality screen share (1080p60)
limit:
  max_video_bitrate: 8000000       # 8 Mbps for screen share
  max_screen_share_bitrate: 12000000  # 12 Mbps cap for screen share
