# LiveKit Server Configuration
# For development use — do NOT use these keys in production

port: 7880
rtc:
  port_range_start: 51000
  port_range_end: 51060
  use_external_ip: false
  tcp_port: 7881

keys:
  devkey: devsecret

logging:
  level: info
  pion_level: warn

room:
  empty_timeout: 300       # 5 minutes
  max_participants: 10     # More than enough for 6-8 friends
